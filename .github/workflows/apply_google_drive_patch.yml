name: Apply Google Drive patch

on:
  push:
    paths:
      - '.github/workflows/apply_google_drive_patch.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch app.py
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app.py')
          text = path.read_text(encoding='utf-8')
          original = text

          if 'googleapiclient.discovery' not in text:
